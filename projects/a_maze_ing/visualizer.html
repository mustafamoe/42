<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A-Maze-ing Visualizer</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f4efe4;
      --ink: #191816;
      --muted: #6f6a60;
      --line: #cfc2af;
      --panel: #fffbf0;
      --green: #0f8b72;
      --green-dark: #075f54;
      --red: #bd3f3f;
      --yellow: #e3a425;
      --blue: #2867a8;
      --shadow: rgba(41, 32, 22, 0.16);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(25, 24, 22, 0.035) 1px, transparent 1px),
        linear-gradient(0deg, rgba(25, 24, 22, 0.035) 1px, transparent 1px),
        var(--paper);
      background-size: 24px 24px;
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 32px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 20px;
      margin-bottom: 18px;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .badge {
      border: 2px solid var(--ink);
      background: var(--yellow);
      color: var(--ink);
      padding: 7px 10px;
      font-family: "Courier New", monospace;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      box-shadow: 4px 4px 0 var(--ink);
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 18px;
      align-items: start;
    }

    .stage {
      min-height: 560px;
      border: 2px solid var(--ink);
      background: var(--panel);
      box-shadow: 10px 10px 0 var(--shadow);
      position: relative;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: min(68vh, 680px);
      min-height: 500px;
      cursor: crosshair;
    }

    .readout {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      border-top: 2px solid var(--ink);
      background: var(--ink);
    }

    .metric {
      background: #fff8e9;
      padding: 12px 14px;
      min-width: 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: clamp(1.1rem, 2vw, 1.55rem);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .controls {
      border: 2px solid var(--ink);
      background: var(--panel);
      box-shadow: 8px 8px 0 var(--shadow);
    }

    .controls-section {
      padding: 16px;
      border-bottom: 2px solid var(--ink);
    }

    .controls-section:last-child {
      border-bottom: 0;
    }

    .controls-title {
      margin: 0 0 12px;
      font-family: "Courier New", monospace;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--muted);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    button {
      min-height: 42px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: #fff8e9;
      color: var(--ink);
      font-family: "Courier New", monospace;
      font-size: 0.84rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    button:hover {
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0 var(--ink);
    }

    button:active {
      transform: translate(0, 0);
      box-shadow: none;
    }

    button.primary {
      background: var(--green);
      color: white;
    }

    button.danger {
      background: var(--red);
      color: white;
    }

    button:disabled {
      color: #8d877b;
      background: #e8dfcf;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      min-width: 0;
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 0.74rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      min-height: 40px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: #fffdfa;
      color: var(--ink);
      padding: 8px 10px;
      font-family: "Courier New", monospace;
      font-size: 1rem;
      font-weight: 700;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--green);
    }

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 40px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: #fffdfa;
      padding: 8px 10px;
    }

    .toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
    }

    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-family: "Courier New", monospace;
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border: 2px solid var(--ink);
      flex: 0 0 auto;
    }

    .swatch.visited { background: rgba(15, 139, 114, 0.28); }
    .swatch.current { background: var(--red); }
    .swatch.stack { background: rgba(227, 164, 37, 0.65); }
    .swatch.pattern { background: var(--ink); }

    .status {
      min-height: 70px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: #fffdfa;
      padding: 10px;
      font-family: "Courier New", monospace;
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.35;
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .controls {
        order: -1;
      }

      canvas {
        height: 58vh;
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100vw - 20px, 1180px);
        padding-top: 16px;
      }

      header {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .readout {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field-grid,
      .button-grid,
      .legend {
        grid-template-columns: 1fr;
      }

      canvas {
        min-height: 360px;
        height: 55vh;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>A-Maze-ing</h1>
      <div class="badge">Randomized DFS Backtracking</div>
    </header>

    <section class="layout" aria-label="Maze generation visualizer">
      <div class="stage">
        <canvas id="mazeCanvas" aria-label="Animated maze generation canvas"></canvas>
        <div class="readout" aria-live="polite">
          <div class="metric">
            <span>Phase</span>
            <strong id="phaseMetric">ready</strong>
          </div>
          <div class="metric">
            <span>Visited</span>
            <strong id="visitedMetric">0/0</strong>
          </div>
          <div class="metric">
            <span>Stack</span>
            <strong id="stackMetric">0</strong>
          </div>
          <div class="metric">
            <span>Step</span>
            <strong id="stepMetric">0</strong>
          </div>
        </div>
      </div>

      <aside class="controls" aria-label="Controls">
        <section class="controls-section">
          <p class="controls-title">Run</p>
          <div class="button-grid">
            <button class="primary" id="playButton" type="button">Play</button>
            <button id="stepButton" type="button">Step</button>
            <button id="resetButton" type="button">Reset</button>
            <button class="danger" id="finishButton" type="button">Finish</button>
          </div>
        </section>

        <section class="controls-section">
          <p class="controls-title">Maze</p>
          <div class="field-grid">
            <label>
              Width
              <input id="widthInput" type="number" min="4" max="60" value="20">
            </label>
            <label>
              Height
              <input id="heightInput" type="number" min="4" max="44" value="15">
            </label>
            <label>
              Seed
              <input id="seedInput" type="text" value="42" maxlength="24">
            </label>
            <label>
              Speed
              <input id="speedInput" type="range" min="1" max="120" value="30">
            </label>
          </div>
        </section>

        <section class="controls-section">
          <p class="controls-title">Options</p>
          <label class="toggle">
            42 Pattern
            <input id="patternInput" type="checkbox" checked>
          </label>
        </section>

        <section class="controls-section">
          <p class="controls-title">Legend</p>
          <div class="legend">
            <div class="legend-item"><span class="swatch visited"></span>Visited</div>
            <div class="legend-item"><span class="swatch stack"></span>Stack</div>
            <div class="legend-item"><span class="swatch current"></span>Current</div>
            <div class="legend-item"><span class="swatch pattern"></span>Pattern</div>
          </div>
        </section>

        <section class="controls-section">
          <p class="controls-title">State</p>
          <div class="status" id="statusText">ready</div>
        </section>
      </aside>
    </section>
  </main>

  <script>
    "use strict";

    const NORTH = 1;
    const EAST = 2;
    const SOUTH = 4;
    const WEST = 8;
    const ALL_WALLS = NORTH | EAST | SOUTH | WEST;
    const DIRECTIONS = [
      { name: "N", dx: 0, dy: -1, wall: NORTH, opposite: SOUTH },
      { name: "E", dx: 1, dy: 0, wall: EAST, opposite: WEST },
      { name: "S", dx: 0, dy: 1, wall: SOUTH, opposite: NORTH },
      { name: "W", dx: -1, dy: 0, wall: WEST, opposite: EAST }
    ];
    const PATTERN_ROWS = [
      "X X XXX",
      "X X   X",
      "XXX XXX",
      "  X X  ",
      "  X XXX"
    ];

    const canvas = document.getElementById("mazeCanvas");
    const ctx = canvas.getContext("2d");
    const playButton = document.getElementById("playButton");
    const stepButton = document.getElementById("stepButton");
    const resetButton = document.getElementById("resetButton");
    const finishButton = document.getElementById("finishButton");
    const widthInput = document.getElementById("widthInput");
    const heightInput = document.getElementById("heightInput");
    const seedInput = document.getElementById("seedInput");
    const speedInput = document.getElementById("speedInput");
    const patternInput = document.getElementById("patternInput");
    const phaseMetric = document.getElementById("phaseMetric");
    const visitedMetric = document.getElementById("visitedMetric");
    const stackMetric = document.getElementById("stackMetric");
    const stepMetric = document.getElementById("stepMetric");
    const statusText = document.getElementById("statusText");

    let state;
    let timer = 0;
    let lastFrame = 0;

    function keyOf(x, y) {
      return `${x},${y}`;
    }

    function parseKey(key) {
      const parts = key.split(",");
      return { x: Number(parts[0]), y: Number(parts[1]) };
    }

    function clampInt(value, min, max) {
      const parsed = Number.parseInt(value, 10);
      if (Number.isNaN(parsed)) {
        return min;
      }
      return Math.min(max, Math.max(min, parsed));
    }

    function hashString(text) {
      let hash = 2166136261;
      for (let i = 0; i < text.length; i += 1) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function makeRandom(seedText) {
      let value = hashString(seedText || "random");
      return function random() {
        value += 0x6D2B79F5;
        let t = value;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function inside(x, y, width, height) {
      return x >= 0 && x < width && y >= 0 && y < height;
    }

    function gridNeighbors(cell, width, height) {
      const result = [];
      for (const direction of DIRECTIONS) {
        const x = cell.x + direction.dx;
        const y = cell.y + direction.dy;
        if (inside(x, y, width, height)) {
          result.push({ x, y, direction });
        }
      }
      return result;
    }

    function patternCellsAt(left, top) {
      const cells = new Set();
      PATTERN_ROWS.forEach((row, y) => {
        [...row].forEach((marker, x) => {
          if (marker === "X") {
            cells.add(keyOf(left + x, top + y));
          }
        });
      });
      return cells;
    }

    function availableCells(width, height, blocked) {
      const available = new Set();
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const key = keyOf(x, y);
          if (!blocked.has(key)) {
            available.add(key);
          }
        }
      }
      return available;
    }

    function remainingCellsConnected(width, height, blocked, entryKey, exitKey) {
      const available = availableCells(width, height, blocked);
      if (!available.has(entryKey) || !available.has(exitKey)) {
        return false;
      }
      const queue = [parseKey(entryKey)];
      const visited = new Set([entryKey]);
      while (queue.length > 0) {
        const current = queue.shift();
        for (const neighbor of gridNeighbors(current, width, height)) {
          const key = keyOf(neighbor.x, neighbor.y);
          if (!available.has(key) || visited.has(key)) {
            continue;
          }
          visited.add(key);
          queue.push({ x: neighbor.x, y: neighbor.y });
        }
      }
      return visited.size === available.size;
    }

    function choosePatternCells(width, height, includePattern) {
      if (!includePattern) {
        return { cells: new Set(), warning: "" };
      }

      const patternWidth = PATTERN_ROWS[0].length;
      const patternHeight = PATTERN_ROWS.length;
      if (width < patternWidth + 2 || height < patternHeight + 2) {
        return {
          cells: new Set(),
          warning: "42 pattern omitted: maze is too small."
        };
      }

      const candidates = [];
      const maxX = width - patternWidth - 1;
      const maxY = height - patternHeight - 1;
      const centerX = (width - patternWidth) / 2;
      const centerY = (height - patternHeight) / 2;

      for (let y = 1; y <= maxY; y += 1) {
        for (let x = 1; x <= maxX; x += 1) {
          candidates.push({ x, y });
        }
      }

      candidates.sort((a, b) => {
        const da = ((a.x - centerX) ** 2) + ((a.y - centerY) ** 2);
        const db = ((b.x - centerX) ** 2) + ((b.y - centerY) ** 2);
        return da - db;
      });

      const entryKey = keyOf(0, 0);
      const exitKey = keyOf(width - 1, height - 1);
      for (const candidate of candidates) {
        const cells = patternCellsAt(candidate.x, candidate.y);
        if (cells.has(entryKey) || cells.has(exitKey)) {
          continue;
        }
        if (remainingCellsConnected(width, height, cells, entryKey, exitKey)) {
          return { cells, warning: "" };
        }
      }

      return {
        cells: new Set(),
        warning: "42 pattern omitted: placement would isolate cells."
      };
    }

    function makeGrid(width, height) {
      return Array.from({ length: height }, () => {
        return Array.from({ length: width }, () => ALL_WALLS);
      });
    }

    function openWall(grid, cell, neighbor, direction) {
      grid[cell.y][cell.x] &= ~direction.wall;
      grid[neighbor.y][neighbor.x] &= ~direction.opposite;
    }

    function resetState() {
      stopTimer();
      const width = clampInt(widthInput.value, 4, 60);
      const height = clampInt(heightInput.value, 4, 44);
      widthInput.value = width;
      heightInput.value = height;

      const pattern = choosePatternCells(width, height, patternInput.checked);
      const available = availableCells(width, height, pattern.cells);
      const entry = { x: 0, y: 0 };
      const entryKey = keyOf(entry.x, entry.y);

      state = {
        width,
        height,
        grid: makeGrid(width, height),
        pattern: pattern.cells,
        patternWarning: pattern.warning,
        available,
        random: makeRandom(seedInput.value),
        phase: "carving",
        visited: new Set([entryKey]),
        stack: [entry],
        current: entry,
        lastMove: null,
        step: 0,
        complete: false,
        solution: []
      };

      draw();
      updateUi();
    }

    function completeCarving() {
      state.phase = "done";
      state.complete = true;
      state.solution = findPath();
    }

    function stepCarving() {
      if (state.stack.length === 0) {
        completeCarving();
        return;
      }

      const current = state.stack[state.stack.length - 1];
      state.current = current;
      const neighbors = gridNeighbors(current, state.width, state.height)
        .filter((neighbor) => {
          const key = keyOf(neighbor.x, neighbor.y);
          return state.available.has(key) && !state.visited.has(key);
        });

      if (neighbors.length === 0) {
        state.stack.pop();
        state.lastMove = { from: current, to: current, kind: "backtrack" };
        state.step += 1;
        return;
      }

      const choice = neighbors[Math.floor(state.random() * neighbors.length)];
      const neighbor = { x: choice.x, y: choice.y };
      openWall(state.grid, current, neighbor, choice.direction);
      state.visited.add(keyOf(neighbor.x, neighbor.y));
      state.stack.push(neighbor);
      state.current = neighbor;
      state.lastMove = { from: current, to: neighbor, kind: "carve" };
      state.step += 1;
    }

    function stepOnce() {
      if (state.complete) {
        stopTimer();
        updateUi();
        return;
      }
      if (state.phase === "carving") {
        stepCarving();
      }
      draw();
      updateUi();
    }

    function findPath() {
      const entry = { x: 0, y: 0 };
      const exit = { x: state.width - 1, y: state.height - 1 };
      const exitKey = keyOf(exit.x, exit.y);
      const queue = [entry];
      const seen = new Set([keyOf(entry.x, entry.y)]);
      const cameFrom = new Map();

      while (queue.length > 0) {
        const current = queue.shift();
        if (keyOf(current.x, current.y) === exitKey) {
          break;
        }

        for (const direction of DIRECTIONS) {
          if ((state.grid[current.y][current.x] & direction.wall) !== 0) {
            continue;
          }
          const next = { x: current.x + direction.dx, y: current.y + direction.dy };
          const nextKey = keyOf(next.x, next.y);
          if (!inside(next.x, next.y, state.width, state.height)) {
            continue;
          }
          if (!state.available.has(nextKey) || seen.has(nextKey)) {
            continue;
          }
          seen.add(nextKey);
          cameFrom.set(nextKey, keyOf(current.x, current.y));
          queue.push(next);
        }
      }

      if (!cameFrom.has(exitKey) && exitKey !== keyOf(entry.x, entry.y)) {
        return [];
      }

      const path = [exitKey];
      let cursor = exitKey;
      while (cursor !== keyOf(entry.x, entry.y)) {
        cursor = cameFrom.get(cursor);
        if (!cursor) {
          return [];
        }
        path.push(cursor);
      }
      return path.reverse();
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * ratio));
      canvas.height = Math.max(1, Math.floor(rect.height * ratio));
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      draw();
    }

    function cellLayout() {
      const rect = canvas.getBoundingClientRect();
      const pad = 22;
      const availableWidth = rect.width - (pad * 2);
      const availableHeight = rect.height - (pad * 2);
      const size = Math.max(
        6,
        Math.floor(Math.min(availableWidth / state.width, availableHeight / state.height))
      );
      const offsetX = Math.floor((rect.width - (size * state.width)) / 2);
      const offsetY = Math.floor((rect.height - (size * state.height)) / 2);
      return { size, offsetX, offsetY, width: rect.width, height: rect.height };
    }

    function fillCell(layout, cell, color) {
      const gap = Math.max(1, layout.size * 0.08);
      ctx.fillStyle = color;
      ctx.fillRect(
        layout.offsetX + cell.x * layout.size + gap,
        layout.offsetY + cell.y * layout.size + gap,
        layout.size - (gap * 2),
        layout.size - (gap * 2)
      );
    }

    function drawMove(layout) {
      if (!state.lastMove) {
        return;
      }
      const colors = {
        carve: "#bd3f3f",
        backtrack: "#e3a425"
      };
      const from = state.lastMove.from;
      const to = state.lastMove.to;
      const x1 = layout.offsetX + (from.x + 0.5) * layout.size;
      const y1 = layout.offsetY + (from.y + 0.5) * layout.size;
      const x2 = layout.offsetX + (to.x + 0.5) * layout.size;
      const y2 = layout.offsetY + (to.y + 0.5) * layout.size;
      ctx.strokeStyle = colors[state.lastMove.kind] || "#bd3f3f";
      ctx.lineWidth = Math.max(3, layout.size * 0.12);
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function drawWalls(layout) {
      ctx.strokeStyle = "#191816";
      ctx.lineWidth = Math.max(2, Math.floor(layout.size * 0.12));
      ctx.lineCap = "square";

      for (let y = 0; y < state.height; y += 1) {
        for (let x = 0; x < state.width; x += 1) {
          const value = state.grid[y][x];
          const left = layout.offsetX + x * layout.size;
          const top = layout.offsetY + y * layout.size;
          const right = left + layout.size;
          const bottom = top + layout.size;

          if ((value & NORTH) !== 0) {
            ctx.beginPath();
            ctx.moveTo(left, top);
            ctx.lineTo(right, top);
            ctx.stroke();
          }
          if ((value & WEST) !== 0) {
            ctx.beginPath();
            ctx.moveTo(left, top);
            ctx.lineTo(left, bottom);
            ctx.stroke();
          }
          if (x === state.width - 1 && (value & EAST) !== 0) {
            ctx.beginPath();
            ctx.moveTo(right, top);
            ctx.lineTo(right, bottom);
            ctx.stroke();
          }
          if (y === state.height - 1 && (value & SOUTH) !== 0) {
            ctx.beginPath();
            ctx.moveTo(left, bottom);
            ctx.lineTo(right, bottom);
            ctx.stroke();
          }
        }
      }
    }

    function drawEndpoints(layout) {
      fillCell(layout, { x: 0, y: 0 }, "#0f8b72");
      fillCell(layout, { x: state.width - 1, y: state.height - 1 }, "#bd3f3f");
      ctx.fillStyle = "#fffdfa";
      ctx.font = `700 ${Math.max(10, layout.size * 0.44)}px Courier New`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(
        "S",
        layout.offsetX + layout.size * 0.5,
        layout.offsetY + layout.size * 0.5
      );
      ctx.fillText(
        "E",
        layout.offsetX + (state.width - 0.5) * layout.size,
        layout.offsetY + (state.height - 0.5) * layout.size
      );
    }

    function draw() {
      if (!state || canvas.width === 0 || canvas.height === 0) {
        return;
      }
      const layout = cellLayout();
      ctx.clearRect(0, 0, layout.width, layout.height);
      ctx.fillStyle = "#fffbf0";
      ctx.fillRect(0, 0, layout.width, layout.height);

      for (const key of state.visited) {
        fillCell(layout, parseKey(key), "rgba(15, 139, 114, 0.24)");
      }

      for (const key of state.solution) {
        fillCell(layout, parseKey(key), "rgba(40, 103, 168, 0.45)");
      }

      for (const cell of state.stack) {
        fillCell(layout, cell, "rgba(227, 164, 37, 0.55)");
      }

      for (const key of state.pattern) {
        fillCell(layout, parseKey(key), "#191816");
      }

      if (state.current) {
        fillCell(layout, state.current, "#bd3f3f");
      }

      drawMove(layout);
      drawEndpoints(layout);
      drawWalls(layout);
    }

    function updateUi() {
      const total = state.available.size;
      phaseMetric.textContent = state.phase;
      visitedMetric.textContent = `${state.visited.size}/${total}`;
      stackMetric.textContent = String(state.stack.length);
      stepMetric.textContent = String(state.step);
      playButton.textContent = timer ? "Pause" : "Play";
      stepButton.disabled = state.complete;
      finishButton.disabled = state.complete;

      const parts = [];
      if (state.patternWarning) {
        parts.push(state.patternWarning);
      }
      if (state.phase === "carving") {
        parts.push(`current: ${keyOf(state.current.x, state.current.y)}`);
      } else {
        parts.push(`solution length: ${Math.max(0, state.solution.length - 1)}`);
      }
      statusText.textContent = parts.join("\n");
    }

    function animationLoop(now) {
      if (!timer) {
        return;
      }
      const stepsPerSecond = Number(speedInput.value);
      const interval = 1000 / stepsPerSecond;
      if (now - lastFrame >= interval) {
        stepOnce();
        lastFrame = now;
      }
      if (!state.complete) {
        timer = requestAnimationFrame(animationLoop);
      } else {
        stopTimer();
      }
    }

    function startTimer() {
      if (timer || state.complete) {
        return;
      }
      lastFrame = performance.now();
      timer = requestAnimationFrame(animationLoop);
      updateUi();
    }

    function stopTimer() {
      if (timer) {
        cancelAnimationFrame(timer);
        timer = 0;
      }
      if (state) {
        updateUi();
      }
    }

    function finish() {
      stopTimer();
      let guard = 0;
      const maxSteps = state.width * state.height * 8;
      while (!state.complete && guard < maxSteps) {
        stepOnce();
        guard += 1;
      }
      draw();
      updateUi();
    }

    playButton.addEventListener("click", () => {
      if (timer) {
        stopTimer();
      } else {
        startTimer();
      }
    });
    stepButton.addEventListener("click", stepOnce);
    resetButton.addEventListener("click", resetState);
    finishButton.addEventListener("click", finish);

    [widthInput, heightInput, seedInput, patternInput].forEach((input) => {
      input.addEventListener("change", resetState);
    });

    const resizeObserver = new ResizeObserver(resizeCanvas);
    resizeObserver.observe(canvas);
    resetState();
    resizeCanvas();
  </script>
</body>
</html>
